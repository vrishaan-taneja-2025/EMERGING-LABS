{% extends "layout_dashboard.html" %}
{% block content %}

<div class="flex justify-between items-center mb-4">
  <h2 class="text-2xl font-bold">Roles</h2>
  <button onclick="openModal('create-role-modal')" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
    + New Role
  </button>
</div>

<!-- Search -->
<form method="get" class="mb-4">
  <input type="text" name="search" value="{{ search }}" placeholder="Search..." class="border rounded px-2 py-1">
  <button class="bg-blue-500 text-white px-3 py-1 rounded hover:bg-blue-600">Search</button>
</form>

<!-- Table -->
<table class="min-w-full bg-white shadow rounded">
  <thead class="bg-gray-100">
    <tr>
      <th class="px-4 py-2 text-left">ID</th>
      <th class="px-4 py-2 text-left">Name</th>
      <th class="px-4 py-2 text-left">Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for role in roles %}
    <tr class="border-b">
      <td class="px-4 py-2">{{ role.id }}</td>
      <td class="px-4 py-2">{{ role.name }}</td>
      <td class="px-4 py-2 space-x-2">
        <button onclick="openViewModal({{ role.id }}, '{{ role.name }}')" class="text-green-500">👁️</button>
        <button onclick="openEditModal({{ role.id }}, '{{ role.name }}')" class="text-blue-500">✏️</button>
        <a href="/roles/delete/{{ role.id }}" class="text-red-500">🗑️</a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>

<!-- Pagination -->
<div class="mt-4 flex justify-center space-x-2">
  {% for p in range(1, (total // per_page) + 2) %}
    <a href="?page={{ p }}&search={{ search }}"
       class="px-3 py-1 rounded {% if p == page %}bg-blue-500 text-white{% else %}bg-gray-200{% endif %}">
       {{ p }}
    </a>
  {% endfor %}
</div>

<!-- Create Modal -->
<div id="create-role-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg p-6 w-96">
    <h3 class="text-xl font-bold mb-4">New Role</h3>
    <form method="post" action="/roles/create">
      <input type="text" name="name" placeholder="Role Name" required class="border rounded px-2 py-1 w-full mb-4">
      <div class="flex justify-end space-x-2">
        <button type="button" onclick="closeModal('create-role-modal')" class="border px-4 py-2 rounded">Cancel</button>
        <button class="bg-blue-500 text-white px-4 py-2 rounded">Save</button>
      </div>
    </form>
  </div>
</div>

<!-- View Modal -->
<div id="view-role-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg p-6 w-96">
    <h3 class="text-xl font-bold mb-4">View Role</h3>
    <p>ID: <span id="view-role-id"></span></p>
    <p>Name: <span id="view-role-name"></span></p>
    <div class="flex justify-end mt-4">
      <button onclick="closeModal('view-role-modal')" class="border px-4 py-2 rounded">Close</button>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div id="edit-role-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg p-6 w-96">
    <h3 class="text-xl font-bold mb-4">Edit Role</h3>
    <form id="edit-role-form" method="post">
      <input type="text" id="edit-role-name" name="name" required class="border rounded px-2 py-1 w-full mb-4">
      <div class="flex justify-end space-x-2">
        <button type="button" onclick="closeModal('edit-role-modal')" class="border px-4 py-2 rounded">Cancel</button>
        <button class="bg-blue-500 text-white px-4 py-2 rounded">Save</button>
      </div>
    </form>
  </div>
</div>

<script>
function openModal(id){ document.getElementById(id).classList.remove("hidden"); }
function closeModal(id){ document.getElementById(id).classList.add("hidden"); }

function openViewModal(id, name){
  document.getElementById("view-role-id").innerText = id;
  document.getElementById("view-role-name").innerText = name;
  openModal("view-role-modal");
}

function openEditModal(id, name){
  document.getElementById("edit-role-name").value = name;
  document.getElementById("edit-role-form").action = `/roles/edit/${id}`;
  openModal("edit-role-modal");
}
</script>

{% endblock %}
