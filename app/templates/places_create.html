{% extends "layout_dashboard.html" %}
{% block content %}
<h2 class="text-2xl font-bold mb-4">Create Place</h2>
<form method="post" class="space-y-4">
    <div>
        <label class="block mb-1">Place Name</label>
        <input type="text" name="name" required class="border rounded px-2 py-1 w-1/3">
    </div>
    <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Save</button>
    <a href="/places" class="ml-2 text-gray-700 hover:text-gray-900">Cancel</a>
</form>
{% endblock %}
