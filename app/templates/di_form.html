{% extends "layout_dashboard.html" %}
{% block content %}

<h2 class="text-2xl font-bold mb-6">Daily Inspection</h2>

<form method="post" class="space-y-4">
{% for e in equipments %}
  <div class="bg-white rounded-lg shadow p-4">
    <h3 class="font-semibold mb-2">{{ e.name }}</h3>

    <div class="grid grid-cols-3 gap-4">
      <select name="serviceability_{{ e.id }}" class="border rounded p-2">
        <option value="S">Serviceable</option>
        <option value="US">Unserviceable</option>
      </select>

      <input name="remarks_{{ e.id }}"
             class="col-span-2 border rounded p-2"
             placeholder="Remarks if unserviceable">
    </div>
  </div>
{% endfor %}

<button class="bg-green-600 text-white px-8 py-3 rounded-lg mt-4">
  Submit Inspection
</button>
</form>

{% endblock %}
